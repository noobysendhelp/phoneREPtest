<!DOCTYPE html>
<html>
<head>
    <title>Elite VBT Sensor Fusion</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
        :root { --neon: #00ff00; --bg: #0a0a0a; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat { background: #1a1a1a; padding: 20px; border-radius: 20px; border: 1px solid #333; position: relative; overflow: hidden; }
        .stat.active { border-color: var(--neon); box-shadow: 0 0 15px rgba(0,255,0,0.2); }
        .val { font-size: 2.8em; font-weight: 900; color: var(--neon); display: block; }
        .label { font-size: 0.7em; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .rir-display { grid-column: 1 / -1; background: linear-gradient(145deg, #1a1a1a, #222); border: 2px solid orange; }
        #rir-val { color: orange; }
        button { background: var(--neon); color: black; border: none; padding: 20px 40px; border-radius: 50px; font-weight: bold; font-size: 1.2em; margin-bottom: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <h2 style="margin-bottom:5px">VBT SENSOR PRO</h2>
    <p style="color:#666; font-size:0.8em; margin-bottom:20px">Prenda o telemóvel firmemente à barra</p>

    <button id="startBtn">ATIVAR SENSORES</button>

    <div class="grid">
        <div class="stat rir-display">
            <span class="label">Reps in Reserve (RIR)</span>
            <span id="rir-val" class="val">-</span>
        </div>
        <div class="stat">
            <span class="label">Vel. Pico</span>
            <span id="vel-val" class="val">0.00</span><small>m/s</small>
        </div>
        <div class="stat">
            <span class="label">Range</span>
            <span id="range-val" class="val">0</span><small>cm</small>
        </div>
        <div class="stat">
            <span class="label">Potência</span>
            <span id="pwr-val" class="val">0</span><small>W</small>
        </div>
        <div class="stat">
            <span class="label">1RM Est.</span>
            <span id="orm-val" class="val">0</span><small>kg</small>
        </div>
    </div>

    <script>
        let v = 0, d = 0, vMax = 0, vRef = 0, reps = 0;
        let lastT = 0, moving = false;
        const peso = 100; // Altere para o seu peso atual

        const startBtn = document.getElementById('startBtn');
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        startBtn.onclick = () => {
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission().then(state => {
                    if (state === 'granted') init();
                });
            } else { init(); }
            startBtn.style.display = 'none';
        };

        function init() {
            window.addEventListener('devicemotion', (e) => {
                let now = performance.now();
                let dt = (now - lastT) / 1000;
                lastT = now;

                // Captura a aceleração linear (sem gravidade) fornecida pelo sensor fusion do telemóvel
                let acc = e.acceleration.z; // Ajuste o eixo conforme a posição do tlm
                
                if (Math.abs(acc) < 0.2) acc = 0; // Filtro de ruído

                v += acc * dt;
                if (Math.abs(v) < 0.04) v = 0; // Previne o drift (desvio)

                if (v > 0.15 && !moving) { moving = true; d = 0; vMax = 0; }

                if (moving) {
                    d += v * dt;
                    if (v > vMax) vMax = v;

                    if (v <= 0) { // Fim da fase concêntrica
                        reps++;
                        if (reps === 1) vRef = vMax;
                        calculateStats(vMax, d);
                        moving = false;
                    }
                }
            });
        }

        function calculateStats(v, dist) {
            // 1. Range
            document.getElementById('range-val').innerText = Math.round(dist * 100);
            document.getElementById('vel-val').innerText = v.toFixed(2);

            // 2. RIR por perda de velocidade
            let perda = (1 - (v / vRef)) * 100;
            let rir = perda < 10 ? 4 : perda < 20 ? 3 : perda < 30 ? 2 : perda < 40 ? 1 : 0;
            document.getElementById('rir-val').innerText = rir;

            // 3. Potência e 1RM
            let pwr = (peso * 9.81) * v;
            let orm = peso / (0.484 + 0.516 * Math.pow(2.71, -0.75 * v));

            document.getElementById('pwr-val').innerText = Math.round(pwr);
            document.getElementById('orm-val').innerText = orm.toFixed(1);

            if (rir <= 1) playBip();
        }

        function playBip() {
            let o = audioCtx.createOscillator();
            o.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + 0.15);
        }
    </script>
</body>
</html>
